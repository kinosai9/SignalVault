[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # Pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
]
ignore = [
    "E501",   # line too long
    "B008",   # do not perform function calls in argument defaults
    "SIM108", # use ternary operator
    "B904",   # raise from err — intentional for typer.Exit pattern
]
exclude = [
    ".venv",
    "__pycache__",
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[lint.per-file-ignores]
"tests/*" = ["SIM105", "SIM117"]
"src/signalvault/llm/mock_provider.py" = ["SIM102", "SIM103"]
"src/signalvault/cli.py" = ["E402", "SIM102", "E741"]
"src/signalvault/workspace/*" = ["E402", "F401"]
"src/signalvault/claim_signal/review.py" = ["E402", "SIM102"]
"src/signalvault/analysis/pipeline.py" = ["E741"]
"src/signalvault/subtitles/parser.py" = ["E741"]
"src/signalvault/db/fts.py" = ["E402"]
"src/signalvault/db/repository.py" = ["E402"]
"src/signalvault/exporters/obsidian.py" = ["E402", "SIM105"]
"src/signalvault/evaluation.py" = ["SIM102"]
"src/signalvault/llm_wiki/applier.py" = ["B007"]
"src/signalvault/llm_wiki/validator.py" = ["F402"]
"src/signalvault/web/routes.py" = ["SIM105"]
"src/signalvault/workspace/metadata.py" = ["SIM102"]
"src/signalvault/workspace/watchlist.py" = ["SIM102"]
"tests/test_llm_wiki.py" = ["E741"]
"tests/test_sources_channels.py" = ["E702", "I001"]
"scripts/*" = ["E402"]
