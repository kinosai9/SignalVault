<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}首次设置{% endblock %} — SignalVault</title>
  <link rel="stylesheet" href="/static/style.css?v=c3-onboarding-1">
</head>
<body class="setup-body">
  <header class="setup-topbar">
    <a class="setup-brand" href="/setup/welcome" aria-label="SignalVault 首次设置">
      <img class="brand-mark" src="/static/signalvault-icon.svg" alt="">
      <span><strong>SignalVault</strong><small>首次使用向导</small></span>
    </a>
    <span class="setup-local-badge">数据保存在本机</span>
  </header>

  <main class="setup-shell">
    <nav class="setup-progress" aria-label="设置进度">
      {% for number, label in [(1, '欢迎'), (2, 'AI 服务'), (3, 'Obsidian'), (4, '完成')] %}
      <div class="setup-step {% if current_step == number %}is-current{% elif current_step > number %}is-done{% endif %}"{% if current_step == number %} aria-current="step"{% endif %}>
        <span>{{ number }}</span><strong>{{ label }}</strong>
      </div>
      {% endfor %}
    </nav>

    {% block setup_content %}{% endblock %}
  </main>

  <footer class="setup-footer">SignalVault 仅供研究参考，不构成投资建议</footer>
  {% block scripts %}{% endblock %}
</body>
</html>
