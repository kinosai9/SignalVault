<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SignalVault{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v=2d2ef5f5">
</head>
<body>
    <div class="app-shell">
        <aside class="app-sidebar">
            <a class="site-brand" href="/" aria-label="SignalVault 首页">
                <img class="brand-mark" src="/static/signalvault-icon.svg" alt="">
                <span class="brand-copy">
                    <span class="brand-title">SignalVault</span>
                    <span class="subtitle">多源投资研究助手</span>
                </span>
            </a>

            {% set current = request.url.path %}
            <div class="nav-label">研究工作台</div>
            <nav class="side-nav" aria-label="主导航">
                <a href="/dashboard"{% if current == '/dashboard' %} class="active"{% endif %}>变化雷达</a>
                <a href="/sources"{% if current == '/sources' or current.startswith('/sources/channels') or current.startswith('/sources/tracked') or current == '/sources/import' or current.startswith('/sources/files') %} class="active"{% endif %}>信息源工作台</a>
                <a href="/sources/import/new"{% if current == '/sources/import/new' %} class="active"{% endif %}>导入中心</a>
                <a href="/search"{% if current == '/search' %} class="active"{% endif %}>知识库搜索</a>
                <a href="/reports"{% if current.startswith('/reports') %} class="active"{% endif %}>报告库</a>
                <a href="/tasks"{% if current.startswith('/tasks') or current.startswith('/content/jobs') or current.startswith('/sync/jobs') %} class="active"{% endif %}>任务与诊断</a>
            </nav>

            <div class="nav-label">来源类型</div>
            <nav class="side-nav side-nav-secondary" aria-label="来源导航">
                <a href="/sources/channels"{% if current == '/sources/channels' or current.startswith('/sources/channels/') %} class="active"{% endif %}>YouTube 视频</a>
                <a href="/sources/import"{% if current == '/sources/import' %} class="active"{% endif %}>网页链接</a>
                <a href="/sources/tracked"{% if current.startswith('/sources/tracked') %} class="active"{% endif %}>固定信息源</a>
                <a href="/sources/files/import"{% if current.startswith('/sources/files') %} class="active"{% endif %}>文件 / PDF</a>
                <a href="/sources/zsxq"{% if current.startswith('/sources/zsxq') %} class="active"{% endif %}>知识星球</a>
            </nav>

            <div class="sidebar-footer">
                <a href="/watchlist/settings">关注设置</a>
                <a href="/docs">API</a>
            </div>
        </aside>

        <div class="app-main">
            <main class="container">
                {% block content %}{% endblock %}
            </main>

            <footer class="site-footer">
                <div class="container">
                    SignalVault 多源投资研究助手 &mdash; 仅供研究参考，不构成投资建议
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
