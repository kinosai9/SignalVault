<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}投资音视频研究助手{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v=2d2ef5f5">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="site-brand">
                <h1><a href="/">投资音视频研究助手</a></h1>
                <span class="subtitle">Local Research Console</span>
            </div>
            <nav class="site-nav">
                {% set current = request.url.path %}
                <a href="/dashboard"{% if current == '/dashboard' %} class="active"{% endif %}>控制台</a>
                <a href="/reports"{% if current.startswith('/reports') %} class="active"{% endif %}>报告库</a>
                <a href="/search"{% if current == '/search' %} class="active"{% endif %}>搜索</a>
                <a href="/sources"{% if current.startswith('/sources') %} class="active"{% endif %}>信息源</a>
                <a href="/docs">API</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% set current = request.url.path %}
        {% if current.startswith('/sources') %}
        <nav class="sub-nav" style="display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap;font-size:0.82rem">
            <a href="/sources"{% if current == '/sources' %} class="sub-nav-active"{% endif %}
               style="padding:6px 14px;border-radius:6px;text-decoration:none;color:var(--text-soft);border:1px solid var(--line-strong,#ddd);
               {% if current == '/sources' %}background:var(--accent);color:#fff;border-color:var(--accent){% endif %}">📋 总览</a>
            <a href="/sources/channels"{% if current == '/sources/channels' or current.startswith('/sources/channels/') %} class="sub-nav-active"{% endif %}
               style="padding:6px 14px;border-radius:6px;text-decoration:none;color:var(--text-soft);border:1px solid var(--line-strong,#ddd);
               {% if current == '/sources/channels' or current.startswith('/sources/channels/') %}background:var(--accent);color:#fff;border-color:var(--accent){% endif %}">YouTube 频道</a>
            <a href="/sources/tracked"{% if current.startswith('/sources/tracked') %} class="sub-nav-active"{% endif %}
               style="padding:6px 14px;border-radius:6px;text-decoration:none;color:var(--text-soft);border:1px solid var(--line-strong,#ddd);
               {% if current.startswith('/sources/tracked') %}background:var(--accent);color:#fff;border-color:var(--accent){% endif %}">外部信息源</a>
            <a href="/sources/import"{% if current == '/sources/import' %} class="sub-nav-active"{% endif %}
               style="padding:6px 14px;border-radius:6px;text-decoration:none;color:var(--text-soft);border:1px solid var(--line-strong,#ddd);
               {% if current == '/sources/import' %}background:var(--accent);color:#fff;border-color:var(--accent){% endif %}">网页导入</a>
            <a href="/sources/files/import"{% if current.startswith('/sources/files') %} class="sub-nav-active"{% endif %}
               style="padding:6px 14px;border-radius:6px;text-decoration:none;color:var(--text-soft);border:1px solid var(--line-strong,#ddd);
               {% if current.startswith('/sources/files') %}background:var(--accent);color:#fff;border-color:var(--accent){% endif %}">📄 上传文件</a>
        </nav>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            投资音视频研究助手 &mdash; 仅供研究参考，不构成投资建议
        </div>
    </footer>
</body>
</html>
